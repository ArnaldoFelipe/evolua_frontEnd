<app-sidebar></app-sidebar>

<main class="home-container">
    <!-- Seção de Saudação -->
    <header class="home-header">
        <h1 class="greeting">Olá, <span class="user-name">{{usuario?.nome}}</span>!</h1>
        <p class="motivational-message">Acompanhe sua evolução física.</p>
    </header>

    <!-- Seção de Cards Informativos -->
    <section class="cards-section">
        <div class="cards-grid">
            <!-- Card Peso -->
            <div class="info-card">
                <span class="card-icon">⚖️</span>
                <h3 class="card-title">Peso</h3>
                <p class="card-value">{{usuario?.peso}}<span class="card-unit">kg</span></p>
            </div>

            <!-- Card Altura -->
            <div class="info-card">
                <span class="card-icon">📏</span>
                <h3 class="card-title">Altura</h3>
                <p class="card-value">{{usuario?.altura}}<span class="card-unit">m</span></p>
            </div>

            <!-- Card IMC -->
            <div class="info-card">
                <span class="card-icon">📊</span>
                <h3 class="card-title">IMC</h3>
                <p class="card-value">{{usuario?.imc}}</p>
            </div>

            <!-- Card Classificação IMC -->
            <div class="info-card">
                <span class="card-icon">🏷️</span>
                <h3 class="card-title">Classificação</h3>
                <p class="card-value classification">{{usuario?.classificacaoImc}}</p>
            </div>

            <!-- Card Idade -->
            <div class="info-card">
                <span class="card-icon">🎂</span>
                <h3 class="card-title">Idade</h3>
                <p class="card-value">{{usuario?.idade}} <span class="card-unit">anos</span></p>
            </div>
        </div>
    </section>

  
    <app-arnold-chat></app-arnold-chat>
    
</main>
