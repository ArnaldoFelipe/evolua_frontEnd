<!-- Card de Destaque - Chat Arnold -->
    <section class="arnold-section" *ngIf="router.url === '/home'">
        <div class="arnold-card">
            <div class="arnold-avatar">
                <span class="avatar-icon">💪</span>
            </div>
            <div class="arnold-content">
                <h2 class="arnold-title">Arnold - Seu Assistente Fitness</h2>
                <p class="arnold-description">
                    Precisa de motivação ou tem dúvidas sobre seu treino? 
                    Converse com o Arnold e tire suas dúvidas!
                </p>
                <button class="btn-arnold" (click)="toggleChat()">Abrir Chat</button>
            </div>
        </div>
    </section>

    <!-- Botão Flutuante do Arnold (Chat estilo Copilot) -->
<div class="arnold-float-button">
    <button class="arnold-trigger" (click)="toggleChat()" aria-label="Abrir Arnold">
        <span class="trigger-icon">💪</span>
    </button>
</div>

<!-- Container do Chat Arnold (inicialmente escondido) -->
<div class="arnold-chat-container" [class.open]="isChatOpen">
    <div class="chat-header">
        <div class="chat-header-info">
            <span class="chat-avatar">💪</span>
            <div class="chat-header-text">
                <h3>Arnold</h3>
                <p>Seu Assistente Fitness</p>
            </div>
        </div>
        <button class="chat-close" (click)="toggleChat()" aria-label="Fechar chat">×</button>
    </div>
    <div class="chat-messages">
        <div 
        *ngFor="let msg of mensagens" 
        class="message" 
        [ngClass]="msg.tipo === 'bot' ? 'bot-message': 'user-message'">
            <span class="message-avatar">
                {{ msg.tipo === 'bot' ? '💪' : '🧑' }}
            </span>
            <div class="message-content">
                <p>{{msg.texto}}</p>
            </div>
        </div>
    </div>
    <div class="chat-input-area">
        <input 
        type="text"
        [(ngModel)]="mensagem" 
        class="chat-input" 
        placeholder="Digite sua mensagem...">
        <button class="chat-send" (click)="enviarMensagem()">Enviar</button>
    </div>
</div>
